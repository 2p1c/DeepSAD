project_name: ultrasound-anomaly-mvp
seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_healthy_paths:
    - 'E:\数据\260324\TPS\complete\1\41_41_Avg10\data.mat'
  train_damaged_paths:
    - 'E:\数据\260324\TPS\test_damage\15_15_180k_620k_Filter\data(1).mat'
  test_healthy_paths:
    - 'E:\数据\260324\TPS\complete\2\41_41_Avg10\data.mat'
  test_damaged_paths:
    - 'E:\数据\260324\TPS\test_damage\23_23_Avg10\data.mat'
  window_size: 300
  stride: 100
  normalization: zscore  # zscore|minmax
  split_by: path

model:
  embedding_dim: 128
  input_channels: 1
  hidden_channels: [16, 32, 64]
  svdd_objective: deepsad

fusion:
  enabled: true
  mode: late  # late|mid|gated|early
  sources: [time]
  feat_dim: 15  # Keep aligned with utils.preprocessing.FEATURE_VECTOR_DIM for late fusion.
  feat_hidden_dim: 32
  dropout: 0.0

train:
  batch_size: 64
  epochs: 40
  lr: 0.001
  weight_decay: 1.0e-5
  device: cpu
  var_reg_weight: 0.2
  target_embedding_std: 0.01
  var_reg_warmup_epochs: 5
  collapse_std_threshold: 0.001
  collapse_patience: 5
  min_epochs: 10

eval:
  aggregate: mean  # mean|max|p95
  plot_score_distribution: true
  plot_roc: true
  plot_pca: true

output:
  logs_dir: logs
  ckpt_dir: checkpoints
  results_dir: results
