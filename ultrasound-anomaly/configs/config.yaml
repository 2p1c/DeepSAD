project_name: ultrasound-anomaly-mvp
seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_healthy_paths:
    - 'E:\数据\260324\AL_plate\DeepSAD\PZT\complete\1\1_41_41_120k_620k_Avg10\data.mat'
  test_healthy_paths:
    - 'E:\数据\260324\AL_plate\DeepSAD\PZT\complete\2\41_41_Avg10_Filter_same_as_Laser\data.mat'
  test_damaged_paths:
    - 'E:\数据\260324\AL_plate\DeepSAD\PZT\damaged\test_damage\data.mat'
  window_size: 1000
  stride: 1000
  normalization: zscore  # zscore|minmax
  split_by: path

model:
  embedding_dim: 128
  input_channels: 1
  hidden_channels: [16, 32, 64]
  svdd_objective: one-class

fusion:
  enabled: true
  mode: late  # late|mid|gated|early
  sources: [time]
  feat_dim: 15  # Keep aligned with utils.preprocessing.FEATURE_VECTOR_DIM for late fusion.
  feat_hidden_dim: 32
  dropout: 0.0

train:
  batch_size: 64
  epochs: 50
  lr: 0.001
  weight_decay: 1.0e-5
  device: cpu
  var_reg_weight: 0.2
  target_embedding_std: 0.01
  var_reg_warmup_epochs: 5
  collapse_std_threshold: 0.001
  collapse_patience: 5
  min_epochs: 10

eval:
  aggregate: mean  # mean|max|p95
  plot_score_distribution: true
  plot_roc: true
  plot_pca: true

output:
  logs_dir: logs
  ckpt_dir: checkpoints
  results_dir: results
